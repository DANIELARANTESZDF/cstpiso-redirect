<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecionando para GranilPiso</title>
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="refresh" content="0;url=https://www.granilpiso.com.br/">
  <link id="canonical-link" rel="canonical" href="https://www.granilpiso.com.br/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ec;
      --card: #fffdf8;
      --text: #1d1b18;
      --muted: #625a4d;
      --border: #ded6c8;
      --accent: #8a5a2b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(138, 90, 43, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 640px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 20px 45px rgba(29, 27, 24, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    code {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(138, 90, 43, 0.09);
      color: var(--text);
      font-family: "Courier New", monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecionando para GranilPiso</h1>
    <p>Este domínio existe apenas para encaminhar o acesso para o site oficial.</p>
    <p>Se o navegador não avançar sozinho, use este link:</p>
    <p><a id="redirect-link" href="https://www.granilpiso.com.br/">Abrir GranilPiso</a></p>
    <p>Destino calculado: <code id="redirect-code">https://www.granilpiso.com.br/</code></p>
    <noscript>
      <p>O JavaScript está desativado. Nesse caso, siga manualmente para <a href="https://www.granilpiso.com.br/">https://www.granilpiso.com.br/</a>.</p>
    </noscript>
  </main>
  <script src="./redirect.js"></script>
</body>
</html>
